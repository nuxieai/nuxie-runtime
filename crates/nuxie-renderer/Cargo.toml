[package]
name = "nuxie-renderer"
version = "0.1.0"
edition = "2021"
license = "MIT"

[features]
default = []
decode-oracle = []
perf-diagnostics = []
perf-counters = []

[dependencies]
bytemuck = { version = "1.24", features = ["derive"] }
jpeg-decoder = { version = "0.3", default-features = false }
moxcms = "0.8.1"
nuxie-render-api = { path = "../nuxie-render-api" }
pollster = "0.4"
png = "0.18"
wgpu = "30.0.0"

[dev-dependencies]
naga = { version = "30.0.0", features = ["wgsl-in"] }
nuxie-render-stream = { path = "../nuxie-render-stream" }
sha2 = "0.10"
