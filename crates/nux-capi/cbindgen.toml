language = "C"
include_guard = "NUX_CAPI_GENERATED_H"
autogen_warning = "/* Generated by cbindgen. Do not edit by hand. */"
documentation = true
usize_is_size_t = true
cpp_compat = true
style = "both"
sort_by = "Name"

[enum]
prefix_with_name = true
rename_variants = "ScreamingSnakeCase"

[export]
exclude = ["__nuxie_size_report_renderer_roots"]

[parse]
parse_deps = false
