name: Trusted macOS CI

on:
  workflow_call:
    inputs:
      force_hosted:
        description: >-
          Run every Apple job on GitHub-hosted macOS. This is a one-way safety
          override: fork pull requests remain hosted even when this is false.
        required: false
        type: boolean
        default: false

permissions:
  contents: read

env:
  RIVE_RUNTIME_REF: d788e8ec6e8b598526607d6a1e8818e8b637b60c
  RIVE_RUNTIME_DIR: ${{ github.workspace }}/rive-runtime
  RIVE_PREMAKE_TAG: v5.0.0-beta7

jobs:
  # SECURITY: The nuxie-macos runner group must select only this reusable
  # workflow at a protected nuxie-runtime ref. The decision below is made from
  # the immutable event context inside that trusted workflow. A caller can set
  # force_hosted to broaden execution to GitHub-hosted macOS, but can never use
  # it to put a fork pull request on a persistent Nuxie runner.
  v2-golden:
    name: V2 golden compare
    runs-on: ${{ fromJSON((inputs.force_hosted || (github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name != github.repository)) && '["macos-14"]' || '["self-hosted","macOS","ARM64","nuxie-pr"]') }}
    env:
      RUSTUP_TOOLCHAIN: stable
    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout rive-rust
        uses: actions/checkout@v4
        with:
          path: rive-rust

      - name: Checkout reference rive-runtime
        uses: actions/checkout@v4
        with:
          repository: rive-app/rive-runtime
          ref: ${{ env.RIVE_RUNTIME_REF }}
          path: rive-runtime

      - name: Install Rust stable
        run: rustup toolchain install stable --profile minimal --component rustfmt --no-self-update

      - name: Build reference Rive runtime
        working-directory: ${{ env.RIVE_RUNTIME_DIR }}
        run: |
          RIVE_PREMAKE_ARGS="--file=premake5_v2.lua --with_rive_text --with_rive_layout" build/build_rive.sh debug
          echo "${RIVE_RUNTIME_DIR}/build/dependencies/premake-core/bin/${RIVE_PREMAKE_TAG}_release" >> "${GITHUB_PATH}"

      - name: Fetch pinned test assets
        working-directory: ${{ github.workspace }}/rive-rust
        run: make fixtures

      - name: Run golden compare
        working-directory: ${{ github.workspace }}/rive-rust
        run: make golden-compare

      - name: Run forced-scripted golden compare
        working-directory: ${{ github.workspace }}/rive-rust
        run: make scripted-golden-compare

      - name: Run Rust workspace tests
        working-directory: ${{ github.workspace }}/rive-rust
        run: cargo test --workspace

  capi-smoke:
    name: C ABI smoke test
    runs-on: ${{ fromJSON((inputs.force_hosted || (github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name != github.repository)) && '["macos-14"]' || '["self-hosted","macOS","ARM64","nuxie-pr"]') }}
    env:
      RUSTUP_TOOLCHAIN: stable
    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout rive-rust
        uses: actions/checkout@v4

      - name: Install Rust stable
        run: rustup toolchain install stable --profile minimal --no-self-update

      - name: Fetch pinned test assets
        run: make fixtures

      - name: Build and run C smoke test
        run: make capi-smoke

  apple-runtime-check:
    name: Apple runtime ABI and header
    runs-on: ${{ fromJSON((inputs.force_hosted || (github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name != github.repository)) && '["macos-14"]' || '["self-hosted","macOS","ARM64","nuxie-pr"]') }}
    env:
      DEVELOPER_DIR: ${{ (inputs.force_hosted || (github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name != github.repository)) && '/Applications/Xcode_15.4.app/Contents/Developer' || '/Applications/Xcode.app/Contents/Developer' }}
      NUX_APPLE_XCODE_VERSION: ${{ (inputs.force_hosted || (github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name != github.repository)) && '15.4' || '26.2' }}
      NUX_APPLE_XCODE_BUILD: ${{ (inputs.force_hosted || (github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name != github.repository)) && '15F31d' || '17C52' }}
      RUSTUP_TOOLCHAIN: "1.94.1"
    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout nuxie-runtime
        uses: actions/checkout@v4

      - name: Verify the pinned Apple toolchain
        run: |
          test "$(xcodebuild -version | sed -n 's/^Xcode //p')" = "${NUX_APPLE_XCODE_VERSION}"
          test "$(xcodebuild -version | sed -n 's/^Build version //p')" = "${NUX_APPLE_XCODE_BUILD}"

      - name: Install pinned Rust toolchain
        run: rustup toolchain install 1.94.1 --profile minimal --component clippy --no-self-update

      - name: Fetch pinned test assets
        run: make fixtures

      - name: Test the product ABI and header
        run: make apple-runtime-check

      - name: Capture Apple runtime check diagnostics
        if: always()
        continue-on-error: true
        run: |
          diagnostics="${RUNNER_TEMP}/apple-runtime-check-diagnostics.txt"
          {
            echo "phase=apple-runtime-check"
            echo "commit=${GITHUB_SHA}"
            df -h .
            du -sh target 2>/dev/null || true
            du -sh target/debug target/release-apple 2>/dev/null || true
          } | tee "${diagnostics}"

      - name: Upload Apple runtime check diagnostics
        if: always()
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: apple-runtime-check-diagnostics-${{ github.run_attempt }}
          path: ${{ runner.temp }}/apple-runtime-check-diagnostics.txt
          if-no-files-found: warn
          retention-days: 7

  apple-runtime-xcframework:
    name: Apple runtime XCFramework
    runs-on: ${{ fromJSON((inputs.force_hosted || (github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name != github.repository)) && '["macos-14"]' || '["self-hosted","macOS","ARM64","nuxie-pr"]') }}
    env:
      DEVELOPER_DIR: ${{ (inputs.force_hosted || (github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name != github.repository)) && '/Applications/Xcode_15.4.app/Contents/Developer' || '/Applications/Xcode.app/Contents/Developer' }}
      NUX_APPLE_XCODE_VERSION: ${{ (inputs.force_hosted || (github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name != github.repository)) && '15.4' || '26.2' }}
      NUX_APPLE_XCODE_BUILD: ${{ (inputs.force_hosted || (github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name != github.repository)) && '15F31d' || '17C52' }}
      RUSTUP_TOOLCHAIN: "1.94.1"
    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout nuxie-runtime
        uses: actions/checkout@v4

      - name: Verify the pinned Apple toolchain
        run: |
          test "$(xcodebuild -version | sed -n 's/^Xcode //p')" = "${NUX_APPLE_XCODE_VERSION}"
          test "$(xcodebuild -version | sed -n 's/^Build version //p')" = "${NUX_APPLE_XCODE_BUILD}"

      - name: Install pinned Rust toolchain and Apple targets
        run: |
          rustup toolchain install 1.94.1 --profile minimal --component llvm-tools --no-self-update
          rustup target add --toolchain 1.94.1 aarch64-apple-ios aarch64-apple-ios-sim x86_64-apple-ios

      - name: Report packaging runner capacity
        run: |
          echo "phase=apple-runtime-xcframework-start"
          df -h .

      - name: Assemble and verify the release XCFramework
        run: make apple-runtime-xcframework

      - name: Upload the verified Apple runtime candidate
        uses: actions/upload-artifact@v4
        with:
          name: nuxie-runtime-apple-${{ github.sha }}
          path: |
            target/apple-runtime/NuxieRuntime.xcframework.zip
            target/apple-runtime/artifact.json
          if-no-files-found: error

      - name: Capture Apple runtime packaging diagnostics
        if: always()
        continue-on-error: true
        run: |
          diagnostics="${RUNNER_TEMP}/apple-runtime-xcframework-diagnostics.txt"
          {
            echo "phase=apple-runtime-xcframework"
            echo "commit=${GITHUB_SHA}"
            df -h .
            du -sh target 2>/dev/null || true
            du -sh target/apple-runtime/* 2>/dev/null | sort -h || true
            info_plist="target/apple-runtime/NuxieRuntime.xcframework/Info.plist"
            metadata="target/apple-runtime/artifact.json"
            if [[ -f "${info_plist}" ]]; then
              echo "artifact=${info_plist}"
              plutil -p "${info_plist}" || true
            else
              echo "missing=${info_plist}"
            fi
            if [[ -f "${metadata}" ]]; then
              echo "artifact=${metadata}"
              python3 -m json.tool "${metadata}" || true
            else
              echo "missing=${metadata}"
            fi
          } | tee "${diagnostics}"

      - name: Upload Apple runtime packaging diagnostics
        if: always()
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: apple-runtime-xcframework-diagnostics-${{ github.run_attempt }}
          path: ${{ runner.temp }}/apple-runtime-xcframework-diagnostics.txt
          if-no-files-found: warn
          retention-days: 7

  apple-runtime:
    name: Apple runtime product boundary
    if: ${{ always() }}
    needs:
      - apple-runtime-check
      - apple-runtime-xcframework
    runs-on: ubuntu-latest
    steps:
      - name: Require both Apple runtime gates
        env:
          APPLE_RUNTIME_CHECK_RESULT: ${{ needs.apple-runtime-check.result }}
          APPLE_RUNTIME_XCFRAMEWORK_RESULT: ${{ needs.apple-runtime-xcframework.result }}
        run: |
          echo "ABI and header: ${APPLE_RUNTIME_CHECK_RESULT}"
          echo "XCFramework: ${APPLE_RUNTIME_XCFRAMEWORK_RESULT}"
          if [[ "${APPLE_RUNTIME_CHECK_RESULT}" != "success" || "${APPLE_RUNTIME_XCFRAMEWORK_RESULT}" != "success" ]]; then
            exit 1
          fi
