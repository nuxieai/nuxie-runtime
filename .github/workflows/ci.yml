name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

env:
  RIVE_RUNTIME_REF: 7c778d13c5d903b3b74eec1dd6bb68a811dea5f2
  RIVE_RUNTIME_DIR: ${{ github.workspace }}/rive-runtime
  RIVE_PREMAKE_TAG: v5.0.0-beta7

jobs:
  v2-golden:
    name: V2 golden compare
    runs-on: macos-14
    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout rive-rust
        uses: actions/checkout@v4
        with:
          path: rive-rust

      - name: Checkout reference rive-runtime
        uses: actions/checkout@v4
        with:
          repository: rive-app/rive-runtime
          ref: ${{ env.RIVE_RUNTIME_REF }}
          path: rive-runtime

      - name: Install Rust stable
        run: |
          rustup toolchain install stable --profile minimal --no-self-update
          rustup default stable

      - name: Build reference Rive runtime
        working-directory: ${{ env.RIVE_RUNTIME_DIR }}
        run: |
          RIVE_PREMAKE_ARGS="--file=premake5_v2.lua --with_rive_text --with_rive_layout" build/build_rive.sh debug
          echo "${RIVE_RUNTIME_DIR}/build/dependencies/premake-core/bin/${RIVE_PREMAKE_TAG}_release" >> "${GITHUB_PATH}"

      - name: Fetch pinned test assets
        working-directory: ${{ github.workspace }}/rive-rust
        run: make fixtures

      - name: Run golden compare
        working-directory: ${{ github.workspace }}/rive-rust
        run: make golden-compare

      - name: Run Rust workspace tests
        working-directory: ${{ github.workspace }}/rive-rust
        run: cargo test --workspace

  capi-smoke:
    name: C ABI smoke test
    runs-on: macos-14
    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout rive-rust
        uses: actions/checkout@v4

      - name: Install Rust stable
        run: |
          rustup toolchain install stable --profile minimal --no-self-update
          rustup default stable

      - name: Fetch pinned test assets
        run: make fixtures

      - name: Build and run C smoke test
        run: make capi-smoke

  browser-renderer:
    name: Browser WebGPU and WebGL2
    runs-on: macos-14
    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout rive-rust
        uses: actions/checkout@v4

      - name: Install Rust stable with wasm target
        run: |
          rustup toolchain install stable --profile minimal --no-self-update
          rustup default stable
          rustup target add wasm32-unknown-unknown

      - name: Fetch pinned test assets
        run: make fixtures

      - name: Verify browser WebGPU, WebGL2, and fallback
        env:
          BROWSER_RENDERER_BROWSER: chrome
        run: make browser-renderer-smoke

  renderer-golden:
    name: Phase R pixel golden
    runs-on: macos-14
    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout rive-rust
        uses: actions/checkout@v4

      - name: Checkout reference rive-runtime
        uses: actions/checkout@v4
        with:
          repository: rive-app/rive-runtime
          ref: ${{ env.RIVE_RUNTIME_REF }}
          path: rive-runtime

      - name: Install Rust stable
        run: |
          rustup toolchain install stable --profile minimal --no-self-update
          rustup default stable

      - name: Install pinned renderer shader tools
        run: |
          tap=openai/rive-shader-tools
          brew tap-new --no-git "$tap"
          tap_dir="$(brew --repository "$tap")"
          curl -fsSL https://raw.githubusercontent.com/Homebrew/homebrew-core/aad3312cb71e895b3c62db86c8f08a897a876323/Formula/s/spirv-headers.rb -o "$tap_dir/Formula/spirv-headers.rb"
          curl -fsSL https://raw.githubusercontent.com/Homebrew/homebrew-core/aad3312cb71e895b3c62db86c8f08a897a876323/Formula/s/spirv-tools.rb -o "$tap_dir/Formula/spirv-tools.rb"
          curl -fsSL https://raw.githubusercontent.com/Homebrew/homebrew-core/d716f586c4f58e3cc5cfc999a4e79e9a2a234b6b/Formula/g/glslang.rb -o "$tap_dir/Formula/glslang.rb"
          for formula in glslang spirv-tools spirv-headers; do
            brew uninstall --ignore-dependencies "$formula" || true
          done
          # These formulae are pinned by source revision but live under a
          # temporary tap. Reusing homebrew/core bottles can retain the core
          # rack metadata and fail before installation on newer Homebrew.
          brew install --build-from-source "$tap/spirv-headers"
          brew install --build-from-source "$tap/spirv-tools"
          brew install --build-from-source "$tap/glslang"
          cargo install naga-cli --version 30.0.0 --locked

      - name: Verify renderer shader provenance
        run: make renderer-shaders-check

      - name: Verify vendored wgpu backend and downstream graph
        run: make renderer-wgpu-backend-check renderer-wgpu-consumer-check

      - name: Build reference runtime and renderer for dual fuzz replay
        working-directory: ${{ env.RIVE_RUNTIME_DIR }}
        run: |
          RIVE_PREMAKE_ARGS="--file=premake5_v2.lua --with_rive_text --with_rive_layout" build/build_rive.sh debug
          cd renderer
          PATH="${RIVE_RUNTIME_DIR}/build:${PATH}" build_rive.sh debug -- rive_pls_renderer rive_decoders libpng zlib libjpeg libwebp rive_harfbuzz rive_sheenbidi rive_yoga

      - name: Verify dual fuzz replay, stub baseline, and Rust renderer pixels
        run: |
          make renderer-fuzz-replay
          make renderer-stub-baseline
          make renderer-golden

  # Optional perf artifact: continue-on-error keeps this job from affecting
  # the workflow's pass/fail status.
  perf-json:
    name: Perf JSON artifact (optional)
    runs-on: macos-14
    continue-on-error: true
    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout rive-rust
        uses: actions/checkout@v4
        with:
          path: rive-rust

      - name: Checkout reference rive-runtime
        uses: actions/checkout@v4
        with:
          repository: rive-app/rive-runtime
          ref: ${{ env.RIVE_RUNTIME_REF }}
          path: rive-runtime

      - name: Install Rust stable
        run: |
          rustup toolchain install stable --profile minimal --no-self-update
          rustup default stable

      - name: Build reference Rive runtime (release)
        working-directory: ${{ env.RIVE_RUNTIME_DIR }}
        run: |
          RIVE_PREMAKE_ARGS="--file=premake5_v2.lua --with_rive_text --with_rive_layout" build/build_rive.sh release
          echo "${RIVE_RUNTIME_DIR}/build/dependencies/premake-core/bin/${RIVE_PREMAKE_TAG}_release" >> "${GITHUB_PATH}"

      - name: Generate perf JSON
        working-directory: ${{ github.workspace }}/rive-rust
        run: |
          make perf-json PERF_JSON_META="--meta build_profile=release --meta git_sha=${GITHUB_SHA} --meta timestamp=$(date -u +%Y-%m-%dT%H:%M:%SZ)"

      - name: Upload perf JSON artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: perf-compare-json
          path: rive-rust/target/perf-compare.json
          if-no-files-found: ignore

  # Negative-input fuzz smoke gate. This is additive and self-contained: it
  # fetches its pinned upstream seed corpus before running and needs no built
  # C++ reference runtime. cargo-fuzz requires the nightly
  # toolchain (libFuzzer + `-Z sanitizer`), pinned here via `rustup default
  # nightly`. The time budget is deliberately short -- this proves the harness
  # builds and runs, it is not a fuzzing campaign. If the nightly install ever
  # becomes disproportionate, drop the `make fuzz-smoke` step to `make
  # fuzz-build` for a build-only gate.
  fuzz-smoke:
    name: Fuzz smoke gate
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout rive-rust
        uses: actions/checkout@v4

      - name: Install Rust nightly + cargo-fuzz
        run: |
          rustup toolchain install nightly --profile minimal --no-self-update
          rustup default nightly
          cargo install cargo-fuzz --locked

      - name: Fetch pinned test assets
        run: make fixtures

      - name: Build and smoke-run fuzz targets
        run: make fuzz-smoke FUZZ_CARGO=cargo FUZZ_SMOKE_SECONDS=20

  # Panic-freedom clippy gate for the SDK runtime crates (v2-status item 20
  # #6). Self-contained: library targets only, no reference runtime needed.
  # Denies clippy::unwrap_used / indexing_slicing / arithmetic_side_effects on
  # the crates that are already clean and reports own-src warning counts for
  # the rest; see the lint-gate target in the Makefile.
  lint-gate:
    name: Clippy lint gate
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout rive-rust
        uses: actions/checkout@v4

      - name: Install Rust stable + clippy
        run: |
          rustup toolchain install stable --profile minimal --component clippy --no-self-update
          rustup default stable

      - name: Run the clippy lint gate
        run: make lint-gate
