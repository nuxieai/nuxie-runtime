schema_version = 1

# Completed regression-floor minima. Corpus growth may raise these values in
# the same ticket that raises its ratchet; neither value may move backward.
[floor]
runtime_entries = 317
runtime_exact_segments = 647
renderer_entries = 1468

# The A-row checklist remains source-of-truth in docs/parity-gap-register.md.
# A closure is added here only in the same mechanically-gated ticket that
# closes the corresponding register row.
[sdk]
rows = ["A1", "A2", "A3", "A4", "A5", "A6", "A7", "A8"]
closed = []

# M5 Max and Apple Paravirtual device have each passed the same-adapter C++
# Dawn/Rust wgpu corpus. #HD-2's distinct-adapter ratchet is green; its
# purpose-built clockwise-atomic hypothesis oracle remains open.
[platform]
verified_adapters = [
  "Apple M5 Max / Dawn WebGPU on Metal",
  "Apple Paravirtual device / Dawn WebGPU on Metal",
]
required_adapters = 2

# #OR-9 owns changing the current six-file, non-blocking measurement into
# this blocking gate. These are the existing map requirements, not new limits.
[performance]
blocking_min_entries = 20
max_ratio = 1.0
