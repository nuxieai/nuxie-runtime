version = 1
title = "C++ runtime drawing port ownership ledger"
upstream_ref = "d788e8ec6e8b598526607d6a1e8818e8b637b60c"
porting_rules_file = "docs/PORTING.md"
phase = "ownership-proof-before-scene-cache-removal"

# This count is a ratchet, not a completion claim. `make
# runtime-drawing-port-closed` requires pending=0, compensation=0, and every
# legacy symbol count below to reach zero.
expected_status_counts = { exact = 5, adapted = 26, pending = 4, compensation = 4 }

[[batch]]
id = "shape_path_paint"
sequence = 1
depends_on = []
boundary = "Shape, PathComposer, ShapePaintPath, and ShapePaint own their complete CPU and backend draw state."

[[batch]]
id = "image_mesh"
sequence = 2
depends_on = ["shape_path_paint"]
boundary = "ImageAsset, Image, Mesh, and NSlicer own render images and mesh buffers without an artboard cache."

[[batch]]
id = "text"
sequence = 3
depends_on = ["shape_path_paint", "image_mesh"]
boundary = "Text and TextInput own shaped draw commands, style paints, paths, and emoji images."

[[batch]]
id = "layout_nested"
sequence = 4
depends_on = ["shape_path_paint", "text"]
boundary = "Layout, nested artboards, and component-list occurrences own their live paths and child identity."

[[batch]]
id = "artboard_facade"
sequence = 5
depends_on = ["shape_path_paint", "image_mesh", "text", "layout_nested"]
boundary = "ArtboardInstance owns the complete runtime drawing object graph; the host facade retains no scene replay."

