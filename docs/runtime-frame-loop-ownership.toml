# Counts are ratchets. Source-set globs expand against the pinned checkout, so
# a new, removed, or multiply-owned C++ file changes the count and fails.
[expected_file_status_counts]
faithful = 0
adapted = 0
divergent-by-decision = 0
pending = 337
compensation = 0

# The 41 closed runtime-drawing owners are imported below. The remaining rows
# are the state-bearing frame-loop owners still requiring member-level proof.
[expected_member_status_counts]
faithful = 5
adapted = 36
divergent-by-decision = 0
pending = 33
compensation = 0

[[wave]]
id = "FL-A"
sequence = 1
depends_on = []
boundary = "Component identity, dirt propagation, dependency order, transforms, constraints, and clone identity."

[[wave]]
id = "FL-B"
sequence = 2
depends_on = ["FL-A"]
boundary = "KeyFrame through LinearAnimation, AnimationReset, and blend-animation retained ownership."

[[wave]]
id = "FL-C"
sequence = 3
depends_on = ["FL-A", "FL-B"]
boundary = "StateMachineInstance, layer, transition, action, listener, and input ownership."

[[wave]]
id = "FL-D"
sequence = 4
depends_on = ["FL-A", "FL-B", "FL-C"]
boundary = "Event/DataBind/ViewModel settlement and Artboard update traversal."

[[wave]]
id = "FL-E"
sequence = 5
depends_on = ["FL-A", "FL-D"]
boundary = "Live Artboard draw integration through the existing Renderer/RenderFactory API."

